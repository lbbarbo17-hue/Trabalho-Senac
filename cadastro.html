    <h1>Faça o seu cadastro</h1>

    <fieldset>
        <legend>Dados pessoais</legend>
        <label>Nome Completo:</label>
            <input type="text">
            <br><br>
        <label>Data de nascimento:</label>
            <input type="date">
            <br><br>
        <label>CPF:</label>
        <input type="number" placeholder="XXX.XXX.XXX-XX">
        <label>Telefone:</label>
        <input type="number" placeholder="(XX)XXXXX-XXXX">
        <label>Gênero:</label>
        <input type="radio" name="genero" value="masculino">Masculino
        <input type="radio" name="genero" value="feminino">Feminino
        <input type="radio" name="genero" value="outro">Outro
        <br><br>
        <label>Estado Civil:</label>
        <select name="" id="">
            <option value="">Casado(a)</option>
            <option value="">Solteiro(a)</option>
            <option value="">Divorciado(a)</option>
            <option value="">Viúvo(a)</option>
        </select>
    </fieldset>

    <br>

    <fieldset>
        <legend>Endereço</legend>
        <label>Rua:</label>
            <input type="text">
            <br><br>
        <label>Número:</label>
            <input type="number">
        <label>Bairro:</label>
            <input type="text">
        <label>Estado:</label>
        <select name="estado" id="estado">
<option value="AC">Acre</option>
<option value="AL">Alagoas</option>
<option value="AM">Amazonas</option>
<option value="AP">Amapá</option>
<option value="BA">Bahia</option>
<option value="CE">Ceará</option>
<option value="DF">Distrito Federal</option>
<option value="ES">Espírito Santo</option>
<option value="GO">Goiás</option>
<option value="MA">Maranhão</option>
<option value="MT">Mato Grosso</option>
<option value="MS">Mato Grosso do Sul</option>
<option value="MG">Minas Gerais</option>
<option value="PA">Pará</option>
<option value="PB">Paraíba</option>
<option value="PR">Paraná</option>
<option value="PE">Pernambuco</option>
<option value="PI">Piauí</option>
<option value="RJ">Rio de Janeiro</option>
<option value="RN">Rio Grande do Norte</option>
<option value="RS">Rio Grande do Sul</option>
<option value="RO">Rondônia</option>
<option value="RR">Roraima</option>
<option value="SC">Santa Catarina</option>
<option value="SP">São Paulo</option>
<option value="TO">Tocantins</option>
</select>
        <label>Cidade:</label>
            <input type="text">
        <label>CEP:</label>
            <input type="number" placeholder="XXXXX-XXX">
    </fieldset>

    <br>

    <fieldset>
        <legend>Dados de Login</legend>
        <label>E-mail:</label>
        <input type="text">
        <label>Imagem de perfil:</label>
        <a href="#"><input type="button" value="Escolher arquivo"></a> <label>Nenhum arquivo escolhido</label>
        <label>Senha:</label>
        <input type="text">
        <label>Confirme sua senha:</label>
        <input type="text">

    </fieldset>

    <br>

    <fieldset>
        <legend>Termos e condições</legend>
        <input type="checkbox">
        <label>Eu aceito os <a href="#">termos e condições</a>.</label>
    </fieldset>
    <br>

<a href="login.html"><input type="button" value="Cadastrar"></a>
